<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETO DIO EVOLUTION</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #ff006e; margin-bottom: 5px; }
        .subtitle { color: #fbff00; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1100px; }
        .card { background-color: #161b22; border: 2px solid #30363d; border-radius: 15px; padding: 20px; width: 280px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .card:hover { border-color: #ff006e; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background-color: #ff006e; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #cc0058; }
        .res-box { margin-top: 15px; padding: 12px; background-color: #0d1117; border-left: 4px solid #fbff00; min-height: 20px; }
        @media (max-width: 768px) { .card { width: 100%; } }
    </style>
</head>
<body>

    <h1>DIO Evolution</h1>
    <p class="subtitle">Solução de Desafios Iniciais de JavaScript</p>

    <div class="container">

        <div class="card">
            <h3>🦆 Patinhos</h3>
            <input type="number" id="campoPatinho" placeholder="Quantos foram?">
            <button onclick="fazerPatinho()">EXECUTAR LÓGICA</button>
            <div class="res-box" id="resPatinho">Resultado: —</div>
        </div>

        <div class="card">
            <h3>📊 Média de Notas</h3>
            <input type="number" id="nota1" placeholder="Nota 1">
            <input type="number" id="nota2" placeholder="Nota 2">
            <input type="number" id="nota3" placeholder="Nota 3">
            <button onclick="fazerMedia()">CALCULAR MÉDIA</button>
            <div class="res-box" id="resMedia">Resultado: —</div>
        </div>

        <div class="card">
            <h3>🔢 Dobro</h3>
            <input type="number" id="campoDobro" placeholder="Digite um número">
            <button onclick="fazerDobro()">EXECUTAR LÓGICA</button>
            <div class="res-box" id="resDobro">Resultado: —</div>
        </div>

    </div>

    <script>
        // TESTE DE CONEXÃO: Se você abrir a página, deve aparecer um alerta!
        console.log("Sistema pronto e carregado.");

        function fazerPatinho() {
            let n = document.getElementById('campoPatinho').value;
            let tela = document.getElementById('resPatinho');
            if (n === "") { tela.innerText = "Insira um número!"; return; }
            
            // Lógica: se N > 0, voltam N. Se N = 0, voltam 0.
            let voltaram = (parseInt(n) <= 0) ? 0 : n;
            tela.innerText = "Voltaram " + voltaram + " patinhos.";
        }

        function fazerMedia() {
            let a = document.getElementById('nota1').value;
            let b = document.getElementById('nota2').value;
            let c = document.getElementById('nota3').value;
            let tela = document.getElementById('resMedia');

            if (a === "" || b === "" || c === "") {
                tela.innerText = "Preencha as 3 notas!";
                return;
            }

            // Cálculo da média real
            let m = (parseFloat(a) + parseFloat(b) + parseFloat(c)) / 3;
            tela.innerText = "A média é: " + m.toFixed(1);
        }

        function fazerDobro() {
            let n = document.getElementById('campoDobro').value;
            let tela = document.getElementById('resDobro');
            if (n === "") { tela.innerText = "Insira um número!"; return; }

            let d = parseFloat(n) * 2;
            tela.innerText = "O dobro é: " + d;
        }
    </script>

</body>
</html>
